<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Láor Admin: ระบบจัดส่งของรางวัล</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #fcf9f5; color: #4a4a4a; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; max-width: 600px; margin: 0 auto 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #d4af37; text-align: center; margin-top: 0; border-bottom: 2px solid #f4f4f4; padding-bottom: 15px;}
        
        .shipment-item { border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: left; background: #fff;}
        .reward-title { font-size: 16px; font-weight: bold; color: #8db596; margin-bottom: 10px; }
        .customer-info { font-size: 14px; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 15px; line-height: 1.5; border-left: 3px solid #b0a392;}
        
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;}
        button { background: #d4af37; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 14px;}
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #loader { text-align: center; font-weight: bold; color: #b0a392; margin: 20px 0;}
    </style>
</head>
<body>
    <div class="card">
        <h2>📦 รายการแลกของรอจัดส่ง</h2>
        <div id="loader">กำลังโหลดข้อมูลคลังสินค้า...</div>
        <div id="shipmentList"></div>
    </div>

    <script>
        // เปลี่ยนเป็น URL ของคุณ
        const API_URL = "https://script.google.com/macros/s/AKfycbxluo202bUXgl5mBkmRL0tQiBdlX06VhVP82AovRPVt0597Y5I1UMZV8-cEeb2dZ_kpVA/exec";

        async function loadShipments() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getPendingShipments' }) });
                const result = await res.json();
                document.getElementById('loader').style.display = "none";
                
                let html = "";
                if(result.success && result.shipments.length > 0) {
                    result.shipments.forEach(item => {
                        html += `
                        <div class="shipment-item" id="item-${item.txId}">
                            <div class="reward-title">🎁 ${item.rewardName}</div>
                            
                            <div class="customer-info">
                                <b>ชื่อผู้รับ:</b> ${item.customerName}<br>
                                <b>เบอร์โทร:</b> ${item.customerPhone}<br>
                                <b>ที่อยู่จัดส่ง:</b> ${item.customerAddress}<br>
                                <span style="font-size: 12px; color: #888;">วันที่แลก: ${item.date} | Ref: ${item.txId}</span>
                            </div>
                            
                            <label style="font-size: 13px; font-weight:bold;">กรอกหมายเลข Tracking (พัสดุ):</label>
                            <input type="text" id="track-${item.txId}" placeholder="เช่น TH1234567890">
                            
                            <button id="btn-${item.txId}" onclick="saveShipment('${item.txId}')">✔️ บันทึกและแจ้งลูกค้าว่าจัดส่งแล้ว</button>
                        </div>`;
                    });
                } else { 
                    html = "<p style='text-align:center; color:#888;'>ไม่มีของรางวัลค้างจัดส่งในขณะนี้ครับ 🎉</p>"; 
                }
                document.getElementById('shipmentList').innerHTML = html;
            } catch (e) { 
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล"); 
                document.getElementById('loader').innerText = "โหลดข้อมูลล้มเหลว กรุณารีเฟรช";
            }
        }

        async function saveShipment(txId) {
            const trackNum = document.getElementById(`track-${txId}`).value.trim();
            if(!trackNum) {
                alert("กรุณากรอกหมายเลขพัสดุก่อนบันทึกครับ");
                return;
            }

            if(!confirm(`ยืนยันการจัดส่งรหัส ${txId} ด้วยเลขพัสดุ: ${trackNum} ใช่หรือไม่?`)) return;

            const btn = document.getElementById(`btn-${txId}`);
            btn.disabled = true;
            btn.innerText = "กำลังอัปเดตข้อมูล...";

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'updateShipment', 
                        txId: txId, 
                        tracking: trackNum 
                    }) 
                });
                const result = await res.json();
                
                if(result.success) {
                    alert(result.message);
                    // ซ่อนการ์ดใบนี้ไปเลยเมื่อทำรายการเสร็จ
                    document.getElementById(`item-${txId}`).style.display = "none";
                } else {
                    alert(result.message);
                    btn.disabled = false;
                    btn.innerText = "✔️ บันทึกและแจ้งลูกค้าว่าจัดส่งแล้ว";
                }
            } catch (e) { 
                alert("เกิดข้อผิดพลาดในการอัปเดต"); 
                btn.disabled = false;
                btn.innerText = "✔️ บันทึกและแจ้งลูกค้าว่าจัดส่งแล้ว";
            }
        }

        // โหลดข้อมูลทันทีเมื่อเปิดหน้าเว็บ
        loadShipments();
    </script>
</body>
</html>
