<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBloom Member Club</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="brandName">BioBloom Member</h2>
        <div id="loader">กำลังโหลดข้อมูล...</div>
        
        <div id="profileSection" class="hidden">
            <p>สวัสดีคุณ: <span id="userName">-</span></p>
            <p>ระดับสมาชิก: <b id="userLevel">-</b></p>
            <p>คะแนนสะสมปัจจุบันของคุณคือ: <h1 id="userPoints">0</h1> แต้ม</p>
            <button onclick="dailyCheckIn()">เช็คอินรับแต้มรายวัน (+10)</button>
        </div>

        <div id="registerSection" class="hidden">
            <p>ดูเหมือนคุณยังไม่ได้เป็นสมาชิก</p>
            <input type="text" id="regFullName" placeholder="ชื่อ-นามสกุล"><br><br>
            <input type="tel" id="regPhone" placeholder="เบอร์โทรศัพท์"><br><br>
            <button onclick="register()">สมัครสมาชิกเลย</button>
        </div>
    </div>

    <script>
        // --- 1. ตั้งค่าสำคัญ (เปลี่ยนตรงนี้) ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxluo202bUXgl5mBkmRL0tQiBdlX06VhVP82AovRPVt0597Y5I1UMZV8-cEeb2dZ_kpVA/exec";
        const LIFF_ID = "2009809903-g6N3sM8C"; 

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                checkUser(profile.userId, profile.displayName);
            }
        }

async function checkUser(uid, displayName) {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    redirect: 'follow', // ป้องกันการหลงทางของลิงก์
                    body: JSON.stringify({ action: 'getUser', lineUserId: uid })
                });
                
                const result = await response.json();
                
                document.getElementById('loader').classList.add('hidden');
                
                if (result.exists) {
                    document.getElementById('profileSection').classList.remove('hidden');
                    document.getElementById('userName').innerText = result.name;
                    document.getElementById('userPoints').innerText = result.points;
                    document.getElementById('userLevel').innerText = result.level;
                } else {
                    document.getElementById('registerSection').classList.remove('hidden');
                }
            } catch (error) {
                // ถ้ามีอะไรพัง ให้มันฟ้องออกมาตรงนี้เลย
                document.getElementById('loader').innerHTML = `
                    <div style="color: red; background: #ffe6e6; padding: 15px; border-radius: 10px;">
                        <b>❌ การเชื่อมต่อล้มเหลว</b><br><br>
                        <small>ข้อผิดพลาด: ${error.message}</small><br><br>
                        <small><b>วิเคราะห์สาเหตุหลัก:</b><br>
                        1. ลืม Deploy เป็น "เวอร์ชันใหม่"<br>
                        2. สิทธิ์ไม่ได้ตั้งเป็น "ทุกคน (Anyone)"</small>
                    </div>
                `;
            }
        }

        // ฟังก์ชันอื่นๆ เช่น register, dailyCheckIn จะเขียนเพิ่มในขั้นต่อไป
        // ฟังก์ชันสมัครสมาชิก
        async function register() {
            const fullName = document.getElementById('regFullName').value;
            const phone = document.getElementById('regPhone').value;
            
            if(!fullName || !phone) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนก่อนนะครับ");
                return;
            }

            const profile = await liff.getProfile();
            
            // เปลี่ยนข้อความตอนกำลังโหลด
            document.getElementById('registerSection').innerHTML = "<p>กำลังบันทึกข้อมูล...</p>";

            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: 'register', 
                    lineUserId: profile.userId,
                    displayName: profile.displayName,
                    fullName: fullName,
                    phone: phone
                })
            });
            
            const result = await response.json();
            if(result.success) {
                alert("สมัครสมาชิก BioBloom สำเร็จ! ยินดีต้อนรับครับ");
                location.reload(); // รีเฟรชหน้าเว็บ 1 ครั้งเพื่อโหลดหน้าโปรไฟล์
            }
        }

        // ฟังก์ชันเช็คอินรับแต้ม
        async function dailyCheckIn() {
            const profile = await liff.getProfile();
            
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: 'addPoints', 
                    lineUserId: profile.userId,
                    points: 10,
                    desc: 'เช็คอินรายวัน'
                })
            });
            
            const result = await response.json();
            if(result.success) {
                alert("เช็คอินสำเร็จ! ได้รับ 10 แต้ม\nแต้มรวมของคุณคือ: " + result.newPoints);
                
                // อัปเดตตัวเลขบนหน้าจอทันทีโดยไม่ต้องรีเฟรช
                document.getElementById('userPoints').innerText = result.newPoints;
                document.getElementById('userLevel').innerText = result.level;
            }
        }
        main();
    </script>
</body>
</html>
