<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Láor Skincare Member</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px; background-color: #fcf9f5; margin: 0; color: #4a4a4a; }
        .card { background: white; padding: 25px 20px; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        h2 { color: #d4af37; margin-top: 0;} 
        
        button { color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; margin-top: 10px; width: 100%; font-weight: bold;}
        .btn-green { background-color: #8db596; } 
        .btn-blue { background-color: #b0a392; } 
        .btn-outline { background-color: transparent; border: 2px solid #b0a392; color: #b0a392; }
        
        input, textarea { padding: 12px; width: 100%; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; height: 80px; }
        .hidden { display: none !important; }
        
        #loader { font-weight: bold; color: #b0a392; margin-bottom: 15px; }
        .expire-text { font-size: 13px; color: #e74c3c; margin-top: -10px; margin-bottom: 15px; }
        
        .nav-menu { display: flex; gap: 8px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; overflow-x: auto;}
        .nav-btn { flex: 1; padding: 10px 5px; border-radius: 8px; margin-top: 0; font-size: 14px; white-space: nowrap;}
        
        .list-item { border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.02);}
        .item-name { font-weight: bold; font-size: 17px; color: #333; margin-bottom: 5px;}
        .item-detail { font-size: 13px; color: #777; margin: 8px 0; line-height: 1.4;}
        
        /* ปรับให้ภาพเป็น 1:1 จัตุรัส รองรับขนาด 1000x1000 พอดีเป๊ะ */
        .reward-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 8px; margin-bottom: 12px; background-color: #f4f4f4;}
        .promo-expiry { font-size: 12px; color: #e67e22; font-weight: bold; margin-top: 5px; }
        
        .tracking-box { margin-top: 10px; padding: 10px; background-color: #f8f9fa; border-radius: 8px; border-left: 3px solid #d4af37; font-size: 13px; font-family: monospace; color: #333;}
        
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; margin-bottom: 10px;}
        .status-wait { background-color: #fdf3d8; color: #d4ac0d; }
        .status-done { background-color: #e8f5e9; color: #2e7d32; }

        .order-submit-box { background: #fafafa; padding: 15px; border-radius: 12px; border: 1px dashed #ccc; margin-top: 15px;}
    </style>
</head>
<body>
    <div class="card">
        <h2 id="brandName">Láor Skincare Member</h2>
        <div id="loader">กำลังตรวจสอบข้อมูล...</div>
        <div id="errorLog" class="hidden" style="color:red; font-size:12px; margin-bottom:10px;"></div>

        <div id="navSection" class="nav-menu hidden">
            <button class="nav-btn btn-blue" id="btnProfile" onclick="showSection('profile')">หน้าหลัก</button>
            <button class="nav-btn btn-outline" id="btnRewards" onclick="showSection('rewards')">แลกของ</button>
            <button class="nav-btn btn-outline" id="btnWarehouse" onclick="showSection('warehouse')">คลังของฉัน</button>
        </div>
        
        <div id="profileSection" class="hidden">
            <p style="font-size: 18px; margin-bottom: 5px;">สวัสดีคุณ: <b id="userName">-</b></p>
            <p style="margin-top: 0; color: #888;">สถานะ: <span id="userLevel">-</span></p>
            <p>คะแนนสะสมของคุณ: <h1 id="userPoints" style="margin: 5px 0; color: #d4af37; font-size: 40px;">0</h1></p>
            <p id="expiryNotice" class="expire-text hidden"></p>
            
            <div class="order-submit-box">
                <p style="margin-top:0; font-size:14px; font-weight:bold;">รับแต้มจากการสั่งซื้อ 🛍️</p>
                <input type="text" id="orderInput" placeholder="ระบุหมายเลขคำสั่งซื้อของคุณ" style="margin-bottom: 10px;">
                <button class="btn-green" onclick="submitOrder()">แจ้งตรวจสอบเพื่อรับแต้ม</button>
                
                <p style="font-size:13px; cursor:pointer; color:#b0a392; text-decoration:underline; margin-top:15px; font-weight:bold;" onclick="toggleOrderHistory()">ดูประวัติการส่งเลขสั่งซื้อของฉัน ⬇️</p>
                
                <div id="orderHistoryList" class="hidden" style="text-align:left; font-size:13px; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                    กำลังโหลดประวัติ...
                </div>
            </div>

            <button class="btn-blue" onclick="openUpdateForm()">แก้ไขข้อมูล / ที่อยู่จัดส่ง</button>
        </div>

        <div id="rewardsSection" class="hidden">
            <div id="rewardsList"></div>
        </div>

        <div id="warehouseSection" class="hidden">
            <div id="warehouseList"></div>
        </div>

        <div id="registerSection" class="hidden">
            <h3 style="color:#333;">สมัครสมาชิก Láor</h3>
            <input type="text" id="regFullName" placeholder="ชื่อ-นามสกุล" required><br><br>
            <input type="tel" id="regPhone" placeholder="เบอร์โทรศัพท์" required><br><br>
            <label style="font-size: 13px; display:block; text-align:left; margin-bottom:5px;">วันเดือนปีเกิด:</label>
            <input type="date" id="regDob"><br><br>
            <textarea id="regAddress" placeholder="ที่อยู่สำหรับจัดส่งพัสดุ"></textarea><br><br>
            <button class="btn-green" onclick="register()">สมัครสมาชิกเลย</button>
        </div>

        <div id="updateSection" class="hidden">
            <h3 style="color:#333;">อัปเดตข้อมูลของฉัน</h3>
            <input type="text" id="updFullName" placeholder="ชื่อ-นามสกุล"><br><br>
            <input type="tel" id="updPhone" placeholder="เบอร์โทรศัพท์"><br><br>
            <label style="font-size: 13px; display:block; text-align:left; margin-bottom:5px;">วันเดือนปีเกิด:</label>
            <input type="date" id="updDob"><br><br>
            <textarea id="updAddress" placeholder="ที่อยู่สำหรับจัดส่งพัสดุ"></textarea><br><br>
            <button class="btn-green" onclick="saveUpdate()">บันทึกข้อมูล</button>
            <button class="btn-outline" onclick="showSection('profile')">ยกเลิก</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxluo202bUXgl5mBkmRL0tQiBdlX06VhVP82AovRPVt0597Y5I1UMZV8-cEeb2dZ_kpVA/exec";
        const LIFF_ID = "2009809903-g6N3sM8C";
        let currentUserData = {};

        function showError(err) {
            document.getElementById('errorLog').classList.remove('hidden');
            document.getElementById('errorLog').innerText = err;
            document.getElementById('loader').classList.add('hidden');
        }

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; } 
                const profile = await liff.getProfile();
                await checkUser(profile.userId, profile.displayName);
            } catch (e) { showError("System connection failed."); }
        }

        async function checkUser(uid, displayName) {
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getUser', lineUserId: uid }) });
                const result = await response.json();
                document.getElementById('loader').classList.add('hidden');
                
                if (result.exists) {
                    currentUserData = result; 
                    document.getElementById('navSection').classList.remove('hidden');
                    showSection('profile');
                    
                    document.getElementById('userName').innerText = result.fullName || result.displayName;
                    document.getElementById('userPoints').innerText = result.points;
                    document.getElementById('userLevel').innerText = result.level;

                    if (result.expiringPoints > 0) {
                        document.getElementById('expiryNotice').innerText = `(แต้มจะหมดอายุ ${result.expiringPoints} คะแนน ในวันที่ ${result.expiringDateText})`;
                        document.getElementById('expiryNotice').classList.remove('hidden');
                    } else { document.getElementById('expiryNotice').classList.add('hidden'); }
                } else { document.getElementById('registerSection').classList.remove('hidden'); }
            } catch (e) { showError("Load error."); }
        }

        function showSection(sectionName) {
            ['profile', 'rewards', 'warehouse', 'update', 'register'].forEach(sec => {
                document.getElementById(sec + 'Section').classList.add('hidden');
            });
            document.getElementById(sectionName + 'Section').classList.remove('hidden');

            if(sectionName !== 'update' && sectionName !== 'register') {
                ['Profile', 'Rewards', 'Warehouse'].forEach(btn => { document.getElementById('btn' + btn).className = "nav-btn btn-outline"; });
                document.getElementById('btn' + sectionName.charAt(0).toUpperCase() + sectionName.slice(1)).className = "nav-btn btn-blue";
            }
            if(sectionName === 'rewards') loadRewards();
            if(sectionName === 'warehouse') loadWarehouse();
        }

        async function loadRewards() {
            document.getElementById('rewardsList').innerHTML = "<p>กำลังโหลดแคมเปญ...</p>";
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getRewards' }) });
                const result = await res.json();
                if (result.success && result.rewards.length > 0) {
                    let html = "";
                    result.rewards.forEach(r => {
                        let imgHtml = r.imgUrl ? `<img src="${r.imgUrl}" class="reward-img" alt="poster">` : '';
                        let expiryHtml = r.expiry ? `<div class="promo-expiry">⏳ หมดเขต: ${r.expiry}</div>` : '';
                        
                        html += `
                        <div class="list-item">
                            ${imgHtml}
                            <div class="item-name">${r.name}</div>
                            <div class="item-detail">${r.desc}</div>
                            <div class="item-detail" style="color:#d4af37; font-weight:bold;">ใช้ ${r.points} แต้ม (เหลือ ${r.stock} สิทธิ์)</div>
                            ${expiryHtml}
                            <button class="btn-green" style="margin-top:15px;" onclick="redeemItem('${r.id}', '${r.name}', ${r.points})">แลกรับสิทธิ์</button>
                        </div>`;
                    });
                    document.getElementById('rewardsList').innerHTML = html;
                } else { document.getElementById('rewardsList').innerHTML = "<p>ยังไม่มีโปรโมชั่นครับ</p>"; }
            } catch (e) { showError("Reward load error."); }
        }

        async function loadWarehouse() {
            document.getElementById('warehouseList').innerHTML = "<p>กำลังโหลดคลังของคุณ...</p>";
            try {
                const profile = await liff.getProfile();
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getWarehouse', lineUserId: profile.userId }) });
                const result = await res.json();
                
                if (result.success && result.history.length > 0) {
                    let html = "";
                    result.history.forEach(item => {
                        let isWait = (item.status !== 'รับแล้ว' && item.status !== 'จัดส่งแล้ว');
                        let statusClass = isWait ? 'status-wait' : 'status-done';
                        
                        let trackingHtml = item.tracking ? `
                            <div class="tracking-box">
                                📦 <b>Tracking No:</b><br>${item.tracking}
                            </div>` : '';
                        
                        html += `
                        <div class="list-item">
                            <span class="status-badge ${statusClass}">${item.status}</span>
                            <div class="item-name">${item.name}</div>
                            <div class="item-detail">วันที่: ${item.date} | Ref: ${item.txId}</div>
                            ${trackingHtml}
                        </div>`;
                    });
                    document.getElementById('warehouseList').innerHTML = html;
                } else { document.getElementById('warehouseList').innerHTML = "<p>คุณยังไม่มีประวัติการรับของครับ</p>"; }
            } catch (e) { showError("Warehouse load error."); }
        }

        // --- ระบบส่งหมายเลขคำสั่งซื้อ ---
        async function submitOrder() {
            const orderInput = document.getElementById('orderInput').value.trim();
            if(!orderInput) { alert("กรุณาระบุหมายเลขคำสั่งซื้อก่อนครับ"); return; }
            
            const btn = event.target; btn.disabled = true; btn.innerText = "กำลังส่งข้อมูล...";
            try {
                const profile = await liff.getProfile();
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'submitOrder', lineUserId: profile.userId, orderNum: orderInput }) });
                const result = await res.json();
                if(result.success) {
                    alert(result.message);
                    document.getElementById('orderInput').value = ""; 
                    // โหลดประวัติใหม่ถ้าระบบเปิดอยู่
                    if(isHistoryVisible) toggleOrderHistory(); 
                }
            } catch (e) { alert("ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่"); }
            btn.disabled = false; btn.innerText = "แจ้งตรวจสอบเพื่อรับแต้ม";
        }

        // --- ฟังก์ชันดึงประวัติการส่งเลขคำสั่งซื้อ ---
        let isHistoryVisible = false;
        async function toggleOrderHistory() {
            const listDiv = document.getElementById('orderHistoryList');
            // สลับการซ่อน/โชว์
            if (isHistoryVisible) {
                listDiv.classList.add('hidden');
                isHistoryVisible = false;
                return;
            }
            
            listDiv.classList.remove('hidden');
            listDiv.innerHTML = "กำลังดึงข้อมูล...";
            isHistoryVisible = true;
            
            try {
                const profile = await liff.getProfile();
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getOrderHistory', lineUserId: profile.userId }) });
                const result = await res.json();
                
                if(result.success && result.history.length > 0) {
                    let html = "";
                    result.history.forEach(h => {
                        let statusColor = h.status === "รอตรวจสอบ" ? "#d4ac0d" : "#2e7d32";
                        html += `<div style="margin-bottom:8px; padding:8px; background:white; border-radius:5px; border:1px solid #eee;">
                                    <b>เลขคำสั่งซื้อ:</b> ${h.orderNum}<br>
                                    <span style="color:#888;">วันที่ส่ง: ${h.date}</span><br>
                                    <b>สถานะ: <span style="color:${statusColor}">${h.status}</span></b>
                                 </div>`;
                    });
                    listDiv.innerHTML = html;
                } else { listDiv.innerHTML = "คุณยังไม่เคยส่งหมายเลขคำสั่งซื้อครับ"; }
            } catch(e) { listDiv.innerHTML = "โหลดข้อมูลไม่สำเร็จ"; }
        }

        async function redeemItem(rId, rName, points) {
            if(!currentUserData.address || currentUserData.address.trim() === "") {
                alert("กรุณาเพิ่ม 'ที่อยู่จัดส่ง' ในหน้าข้อมูลส่วนตัว ก่อนทำการแลกของรางวัลครับ");
                openUpdateForm();
                return;
            }

            if(!confirm(`ยืนยันการใช้ ${points} แต้ม เพื่อแลก "${rName}"?`)) return;
            document.getElementById('rewardsList').innerHTML = "<p>กำลังประมวลผล...</p>";
            try {
                const profile = await liff.getProfile();
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'redeem', lineUserId: profile.userId, rewardId: rId, rewardName: rName, points: points }) });
                const result = await res.json();
                if(result.success) {
                    alert("แลกของรางวัลสำเร็จ! แอดมินจะจัดส่งตามที่อยู่ที่ท่านระบุไว้ครับ");
                    document.getElementById('userPoints').innerText = result.newPoints;
                    showSection('warehouse');
                } else { alert("❌ " + result.message); loadRewards(); }
            } catch (e) { alert("Redeem error"); }
        }

        function openUpdateForm() {
            showSection('update');
            document.getElementById('updFullName').value = currentUserData.fullName;
            document.getElementById('updPhone').value = currentUserData.phone;
            if(currentUserData.dob) {
                try {
                    let d = new Date(currentUserData.dob);
                    document.getElementById('updDob').value = d.toISOString().split('T')[0];
                } catch(e) {}
            }
            document.getElementById('updAddress').value = currentUserData.address;
        }

        async function saveUpdate() {
            const fn = document.getElementById('updFullName').value; const ph = document.getElementById('updPhone').value;
            const dob = document.getElementById('updDob').value; const addr = document.getElementById('updAddress').value;
            if(!fn || !ph) { alert("กรุณากรอกชื่อและเบอร์โทรให้ครบถ้วนครับ"); return; }
            
            document.getElementById('updateSection').innerHTML = "<p>กำลังบันทึก...</p>";
            try {
                const profile = await liff.getProfile();
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'updateUser', lineUserId: profile.userId, displayName: profile.displayName, fullName: fn, phone: ph, dob: dob, address: addr }) });
                const result = await res.json();
                if(result.success) { location.reload(); }
            } catch (e) { alert("Save error"); }
        }

        async function register() {
            const fn = document.getElementById('regFullName').value; const ph = document.getElementById('regPhone').value;
            const dob = document.getElementById('regDob').value; const addr = document.getElementById('regAddress').value;
            if(!fn || !ph) { alert("กรุณากรอกชื่อและเบอร์โทรให้ครบถ้วนครับ"); return; }
            
            document.getElementById('registerSection').innerHTML = "<p>กำลังบันทึก...</p>";
            try {
                const profile = await liff.getProfile();
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'register', lineUserId: profile.userId, displayName: profile.displayName, fullName: fn, phone: ph, dob: dob, address: addr }) });
                const result = await res.json();
                if(result.success) { alert("ยินดีต้อนรับสู่ Láor Skincare ครับ!"); location.reload(); }
            } catch (e) { alert("Register error"); }
        }

        main();
    </script>
</body>
</html>
